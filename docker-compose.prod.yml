# ProcureIQ v1.0 — Production Docker Compose
# Runs the complete application stack behind an Nginx reverse proxy with HTTPS.
#
# Usage:
#   1. Copy .env.production.example → .env.production and fill in values
#   2. Obtain TLS certificates (Let's Encrypt recommended):
#        certbot certonly --standalone -d your-domain.com
#        cp /etc/letsencrypt/live/your-domain.com/fullchain.pem ./nginx/certs/cert.pem
#        cp /etc/letsencrypt/live/your-domain.com/privkey.pem   ./nginx/certs/key.pem
#   3. Deploy:
#        docker compose -f docker-compose.prod.yml --env-file .env.production up -d
#
# Environment variables come from .env.production (never committed to source control).

version: "3.9"

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: procureiq-postgres
    restart: always
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-procureiq}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB:-procureiq}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-procureiq}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: procureiq-redis
    restart: always
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend (FastAPI) ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./procureiq-backend
      dockerfile: Dockerfile.prod
    container_name: procureiq-backend
    restart: always
    environment:
      ENVIRONMENT:       production
      SECRET_KEY:        ${SECRET_KEY}
      DATABASE_URL:      postgresql+asyncpg://${POSTGRES_USER:-procureiq}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-procureiq}
      REDIS_URL:         redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/2
      FRONTEND_URL:      ${FRONTEND_URL}
      ALLOWED_ORIGINS:   '["${FRONTEND_URL}"]'
      SHOW_API_DOCS:     "false"
      # Storage
      STORAGE_PROVIDER:      ${STORAGE_PROVIDER:-local}
      STORAGE_LOCAL_PATH:    /app/uploads
      STORAGE_BUCKET:        ${STORAGE_BUCKET:-procureiq-documents}
      STORAGE_ENDPOINT_URL:  ${STORAGE_ENDPOINT_URL:-}
      STORAGE_ACCESS_KEY:    ${STORAGE_ACCESS_KEY:-}
      STORAGE_SECRET_KEY:    ${STORAGE_SECRET_KEY:-}
      STORAGE_REGION:        ${STORAGE_REGION:-us-south}
      # IBM watsonx
      WATSONX_API_KEY:       ${WATSONX_API_KEY:-}
      WATSONX_PROJECT_ID:    ${WATSONX_PROJECT_ID:-}
      WATSONX_URL:           ${WATSONX_URL:-https://us-south.ml.cloud.ibm.com}
      WATSONX_MODEL_ID:      ${WATSONX_MODEL_ID:-ibm/granite-13b-chat-v2}
      # SMTP
      SMTP_ENABLED:          ${SMTP_ENABLED:-false}
      SMTP_HOST:             ${SMTP_HOST:-}
      SMTP_PORT:             ${SMTP_PORT:-587}
      SMTP_USER:             ${SMTP_USER:-}
      SMTP_PASSWORD:         ${SMTP_PASSWORD:-}
      SMTP_FROM:             ${SMTP_FROM:-}
    volumes:
      - upload_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Frontend (React — served as static files by Nginx) ──────────────────────
  frontend:
    build:
      context: ./procureiq-frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api/v1
    container_name: procureiq-frontend
    restart: always
    networks:
      - internal

  # ── Nginx reverse proxy with HTTPS ──────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: procureiq-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      # Serve frontend static files
      - frontend_build:/usr/share/nginx/html:ro
    depends_on:
      - backend
      - frontend
    networks:
      - internal
      - external

volumes:
  postgres_data:
  redis_data:
  upload_data:
  frontend_build:

networks:
  internal:
    driver: bridge
  external:
    driver: bridge
