<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="ProcureIQ — AI-Powered Procurement Intelligence Platform powered by IBM watsonx" />
    <meta name="robots" content="noindex, nofollow" />
    <!-- Security headers via meta (belt-and-suspenders; Nginx also sets these) -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <title>ProcureIQ — Procurement Intelligence Platform</title>
    <!--
      IBM Plex Sans is loaded from Google Fonts for development convenience.
      For production deployments without internet access:
        1. Download the font files from https://fonts.google.com/specimen/IBM+Plex+Sans
        2. Place them in /public/fonts/
        3. Replace the link below with a @font-face stylesheet pointing to /fonts/
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
