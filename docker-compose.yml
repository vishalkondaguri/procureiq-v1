# ProcureIQ v1.0 — Development Docker Compose
# Starts all infrastructure services for local development.
# The FastAPI backend and React frontend run OUTSIDE Docker (native hot-reload).
#
# Usage:
#   docker compose up -d        # start all services
#   docker compose down -v      # stop and remove volumes
#   docker compose logs -f      # follow logs
#
# Prerequisites:
#   Docker Desktop with Compose v2+

version: "3.9"

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: procureiq-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     procureiq
      POSTGRES_PASSWORD: procureiq
      POSTGRES_DB:       procureiq
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U procureiq"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: procureiq-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO (S3-compatible local object storage) ───────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: procureiq-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER:     minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

volumes:
  postgres_data:
  redis_data:
  minio_data:
