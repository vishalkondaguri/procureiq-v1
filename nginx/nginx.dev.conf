# ProcureIQ v1.0 — Nginx Development Config (HTTP only, no TLS)
# Used by docker-compose.yml for local development with hot-reload running natively.
# This proxies API calls from the browser to the FastAPI dev server.
#
# Not used in production — see nginx.prod.conf

server {
    listen 80;
    server_name localhost;

    client_max_body_size 55M;

    # API → FastAPI backend (running on host via uvicorn)
    location /api/ {
        proxy_pass         http://host.docker.internal:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    # Everything else → React dev server (Vite, running on host)
    location / {
        proxy_pass         http://host.docker.internal:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
    }
}
